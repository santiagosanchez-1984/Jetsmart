<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🛫 Mis Vuelos — Ingresar</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%AB%3C/text%3E%3C/svg%3E">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f4f8;
  color: #1a1a2e;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(10,53,96,.15);
  padding: 40px 36px;
  width: 100%;
  max-width: 360px;
  text-align: center;
}

.login-icon {
  font-size: 48px;
  width: 84px; height: 84px;
  margin: 0 auto 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, #0A3560, #1a5a9a);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 16px rgba(10,53,96,.35);
}

.login-card h1 { font-size: 20px; font-weight: 700; color: #0A3560; margin-bottom: 4px; }
.login-card p  { font-size: 13px; color: #888; margin-bottom: 26px; }

.login-field { text-align: left; margin-bottom: 16px; }
.login-field label {
  display: block; font-size: 12px; font-weight: 700; color: #555;
  margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px;
}
.login-field input {
  width: 100%; padding: 11px 14px; font-size: 14px;
  border: 1.5px solid #d0dce8; border-radius: 8px;
  outline: none; transition: border-color .15s;
}
.login-field input:focus { border-color: #1565C0; }

.login-btn {
  width: 100%; padding: 12px; margin-top: 6px;
  background: #0A3560; color: #fff; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: background .15s, transform .1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.login-btn:hover:not(:disabled) { background: #1a5a9a; }
.login-btn:disabled { opacity: .6; cursor: not-allowed; }

.login-error {
  display: none;
  background: #FDECEA; color: #C62828;
  font-size: 13px; font-weight: 600;
  padding: 10px 12px; border-radius: 8px;
  margin-bottom: 16px;
}
.login-error.show { display: block; }

.spinner {
  display: none; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
  border-radius: 50%; animation: spin .7s linear infinite;
}
.spinner.show { display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-icon">🛫</div>
  <h1>Mis Vuelos</h1>
  <p>Ingresá para ver tus reservas</p>

  <div class="login-error" id="login-error"></div>

  <form id="login-form">
    <div class="login-field">
      <label>Usuario</label>
      <input type="text" id="usuario" autocomplete="username" autofocus required>
    </div>
    <div class="login-field">
      <label>Contraseña</label>
      <input type="password" id="clave" autocomplete="current-password" required>
    </div>
    <button type="submit" class="login-btn" id="login-btn">
      <span class="spinner" id="login-spinner"></span>
      <span id="login-btn-txt">Ingresar</span>
    </button>
  </form>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn   = document.getElementById('login-btn');
  var spin  = document.getElementById('login-spinner');
  var txt   = document.getElementById('login-btn-txt');
  var error = document.getElementById('login-error');

  error.classList.remove('show');
  btn.disabled = true;
  spin.classList.add('show');
  txt.textContent = 'Ingresando...';

  fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      usuario: document.getElementById('usuario').value,
      clave: document.getElementById('clave').value
    })
  })
    .then(function(r) { return r.json().then(function(data) { return { ok: r.ok, data: data }; }); })
    .then(function(res) {
      if (res.ok && res.data.ok) {
        location.reload();
        return;
      }
      btn.disabled = false;
      spin.classList.remove('show');
      txt.textContent = 'Ingresar';
      error.textContent = '❌ Usuario o contraseña incorrectos.';
      error.classList.add('show');
    })
    .catch(function() {
      btn.disabled = false;
      spin.classList.remove('show');
      txt.textContent = 'Ingresar';
      error.textContent = '❌ Error de conexión, intentá de nuevo.';
      error.classList.add('show');
    });
});
</script>

</body>
</html>
